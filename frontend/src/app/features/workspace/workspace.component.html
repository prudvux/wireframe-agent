<div class="workspace-root">

  <!-- Top Nav -->
  <header class="workspace-nav">
    <div class="nav-brand">
      <svg xmlns="http://www.w3.org/2000/svg" class="nav-logo" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
          d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
      </svg>
      <span class="nav-title">Stitch Design Studio</span>
    </div>
    <div class="nav-info">
      <span class="screen-count">{{ screens.length }} screen{{ screens.length !== 1 ? 's' : '' }}</span>
    </div>
  </header>

  <!-- Error banner -->
  <div *ngIf="error && !loading" class="error-full">
    <div class="error-full-content">
      <svg xmlns="http://www.w3.org/2000/svg" class="error-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 9v2m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
      </svg>
      <p class="error-msg">{{ error }}</p>
      <a routerLink="/onboarding" class="btn-onboard">Complete Onboarding →</a>
    </div>
  </div>

  <!-- Loading state -->
  <div *ngIf="loading" class="workspace-loading">
    <app-loading-indicator size="lg" message="Loading workspace..."></app-loading-indicator>
  </div>

  <!-- Main split pane -->
  <div *ngIf="!loading && !error" class="workspace-panes">
    <!-- Chat Panel (40%) -->
    <div class="pane pane-chat">
      <app-chat-panel
        [messages]="messages"
        [projectId]="projectId"
        (screenGenerated)="onScreenGenerated($event)"
        (messageAdded)="onMessageAdded($event)"
        (screensAdded)="onScreensAdded($event)"
      ></app-chat-panel>
    </div>

    <!-- Canvas Viewer (60%) -->
    <div class="pane pane-canvas">
      <app-canvas-viewer
        [screens]="screens"
        (expandScreen)="onExpandScreen($event)"
      ></app-canvas-viewer>
    </div>
  </div>

  <!-- Expanded Preview Modal -->
  <div *ngIf="expandedScreen" class="preview-modal-backdrop" (click)="closeExpanded()">
    <div class="preview-modal" (click)="$event.stopPropagation()">
      <div class="preview-modal-header">
        <span class="preview-modal-title">{{ expandedScreen.prompt | slice:0:60 }}{{ expandedScreen.prompt.length > 60 ? '...' : '' }}</span>
        <button class="close-btn" (click)="closeExpanded()" aria-label="Close preview">
          <svg xmlns="http://www.w3.org/2000/svg" class="close-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>
      <div class="preview-modal-body">
        <app-iframe-preview
          [htmlUrl]="expandedScreen.html_url"
          [title]="expandedScreen.prompt"
        ></app-iframe-preview>
      </div>
    </div>
  </div>

</div>
